# MLOps concept:
# Models degrade as real-world data drifts over time.
# Running the full pipeline on a schedule keeps the champion model fresh.

name: Scheduled Retraining

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      # Download the repository files onto the runner
      - name: Checkout code
        uses: actions/checkout@v4
      # Install the Python version used in development
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install all project libraries
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Download California Housing and save to data/raw/
      - name: Load raw data
        run: python src/data/load_data.py
      # Check field types and required columns with Pydantic
      - name: Validate data
        run: python src/data/validate_data.py
      # Fill nulls, fix types, remove outliers → data/processed/train_v1.csv
      - name: Preprocess data
        run: python src/data/preprocess.py
      # Add engineered features → data/processed/train_features_v1.csv
      - name: Feature engineering
        run: python src/data/feature_engineering.py
      # Train LinearRegression and RandomForest; log runs to MLflow
      - name: Train models
        run: python src/models/train.py
      # Register the best run in the MLflow Model Registry
      - name: Register model
        run: python src/models/register_model.py
      # Run quality gate: exit 1 if rmse >= 0.6 or r2 <= 0.7
      - name: Evaluate model
        run: python src/models/evaluate_model.py
